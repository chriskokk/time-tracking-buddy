<!doctype html>
<html lang="en">
  <head>

      content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* ws://127.0.0.1:*;"
    />
    <title>Review a day</title>
    <link rel="stylesheet" href="./styles.css" />
