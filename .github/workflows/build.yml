name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default to read-only; only the release job below needs to write releases.
# The build jobs run untrusted npm install scripts and must not hold a
# writable token while doing so.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Don't leave the repo token in .git/config while npm install
          # scripts (untrusted third-party code) run in this job.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python (distutils for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # electron-vite build only transpiles (esbuild) — without this step a
      # type error ships silently.
      - name: Typecheck
        run: npm run typecheck

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          # set CSC_LINK, CSC_KEY_PASSWORD and APPLE_* secrets to enable macOS signing
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installer
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: ignore

      - name: Upload unsigned Windows installer (for signing)
        id: upload-unsigned
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-unsigned
          path: dist/*.exe
          if-no-files-found: error
      - name: Sign with SignPath
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_ORG_ID != ''
        # Third-party action — pinned by commit SHA (tag v1.3): it receives the
        # SignPath API token, so a moved tag must not be able to swap the code.
        uses: SignPath/github-action-submit-signing-request@ced31329c0317e779dad2eec2a7c3bb46ea1343e # v1.3
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: time-tracking-buddy
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Upload signed Windows installer
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-signed
          path: signed/*.exe
          if-no-files-found: error

  # Single release job: attaching from each matrix job would race on the same
  # release, and the signed-vs-unsigned fallback decision needs both platforms'
  # artifacts in one place.
  release:
    name: Attach release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout (for CHANGELOG.md)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets (signed exe preferred, unsigned fallback)
        run: |
          mkdir -p release-assets
          if compgen -G 'artifacts/win-installer-signed/*.exe' > /dev/null; then
            cp artifacts/win-installer-signed/*.exe release-assets/
          else
            echo '::warning::SignPath not configured — attaching UNSIGNED Windows installer'
            cp artifacts/win-installer/*.exe release-assets/
          fi
          cp artifacts/win-installer/*.blockmap release-assets/ 2>/dev/null || true
          cp artifacts/mac-installer/*.dmg artifacts/mac-installer/*.zip artifacts/mac-installer/*.blockmap release-assets/ 2>/dev/null || true
          ls -l release-assets

      - name: Attach to release
        # Third-party action — pinned by commit SHA (tag v2.6.2): it holds the
        # contents:write token and publishes the release artifacts.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: false
          files: release-assets/*
          fail_on_unmatched_files: true
