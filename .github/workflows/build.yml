name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python (distutils for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          # set CSC_LINK, CSC_KEY_PASSWORD and APPLE_* secrets to enable macOS signing
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installer
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: ignore

      - name: Upload unsigned Windows installer (for signing)
        id: upload-unsigned
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-unsigned
          path: dist/*.exe
          if-no-files-found: error
      - name: Sign with SignPath
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_ORG_ID != ''
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: time-tracking-buddy
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: false
          files: |
            signed/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          fail_on_unmatched_files: false
